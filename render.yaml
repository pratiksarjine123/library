services:
  - type: web
    name: library-management-system
    runtime: python
    rootDir: Library-Management-System-2-main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
